{% extends 'testapp/base.html' %}

{% block title %}Login - Blood Bank Management System{% endblock %}

{% block content %}
<section class="section" style="min-height: 80vh; display: flex; align-items: center; padding-top: 100px;">
    <div class="container">
        <div style="max-width: 500px; margin: 0 auto;">
            <div class="card" style="padding: var(--spacing-xl);">
                <div style="text-align: center; margin-bottom: var(--spacing-xl);">
                    <div style="font-size: 4rem; color: var(--primary-red); margin-bottom: var(--spacing-md);">🩸</div>
                    <h2>Welcome Back</h2>
                    <p style="color: var(--gray);">Login to your account to continue</p>
                </div>
                
                <form method="POST" data-validate="true">
                    {% csrf_token %}
                    
                    <div class="form-group">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" 
                               id="username" 
                               name="username" 
                               class="form-control" 
                               placeholder="Enter your username" 
                               required>
                    </div>
                    
                    <div class="form-group">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" 
                               id="password" 
                               name="password" 
                               class="form-control" 
                               placeholder="Enter your password" 
                               required>
                    </div>
                    
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--spacing-md);">
                        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                            <input type="checkbox" name="remember" style="width: auto;">
                            <span>Remember me</span>
                        </label>
                        <a href="#" style="color: var(--primary-red); font-size: 0.9rem;">Forgot Password?</a>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px;">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </button>
                </form>
                
                <div style="text-align: center; margin-top: var(--spacing-lg); padding-top: var(--spacing-lg); border-top: 1px solid var(--light-gray);">
                    <p>Don't have an account? <a href="{% url 'register' %}" style="color: var(--primary-red); font-weight: 600;">Register here</a></p>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
